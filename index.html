<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAGHOS.IR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #101049;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* همون بکگراند انیمیشنی خفن - دست نخورده */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(116, 255, 179, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* گوی‌های شناور */
        .orbs {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.3;
            animation: float 10s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #74FFB3;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #74FFB3;
            bottom: 10%;
            right: 10%;
            animation-delay: -3s;
            opacity: 0.2;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: #74FFB3;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -6s;
            opacity: 0.15;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }

        /* کانتینر اصلی */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* هدر و لوگو */
        .header {
            text-align: center;
            padding: 3rem 0 2rem 0;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 0.5rem;
            background: linear-gradient(45deg, #74FFB3, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(116, 255, 179, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
            margin-bottom: 1rem;
        }

        @keyframes glow {
            from { 
                text-shadow: 0 0 20px rgba(116, 255, 179, 0.5); 
                filter: drop-shadow(0 0 20px rgba(116, 255, 179, 0.3));
            }
            to { 
                text-shadow: 0 0 40px rgba(116, 255, 179, 0.8), 0 0 80px rgba(116, 255, 179, 0.4);
                filter: drop-shadow(0 0 40px rgba(116, 255, 179, 0.5));
            }
        }

        .logo-subtitle {
            font-size: 1rem;
            color: rgba(116, 255, 179, 0.7);
            letter-spacing: 0.3rem;
            font-weight: 300;
        }

        /* منوی ناوبری */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem 0;
            flex-wrap: wrap;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: rgba(116, 255, 179, 0.05);
            border: 2px solid rgba(116, 255, 179, 0.2);
            border-radius: 50px;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(116, 255, 179, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .nav-item:hover {
            background: #74FFB3;
            color: #101049;
            border-color: #74FFB3;
            box-shadow: 0 10px 30px rgba(116, 255, 179, 0.4);
            transform: translateY(-3px);
        }

        .nav-item:hover::before {
            left: 100%;
        }

        .nav-item.active {
            background: #74FFB3;
            color: #101049;
            border-color: #74FFB3;
            box-shadow: 0 10px 30px rgba(116, 255, 179, 0.4);
        }

        /* آیکون‌های کاستوم SVG */
        .nav-icon {
            width: 24px;
            height: 24px;
            transition: all 0.3s ease;
        }

        .nav-item:hover .nav-icon {
            transform: scale(1.2);
        }

        .nav-icon svg {
            width: 100%;
            height: 100%;
        }

        /* محتوای صفحه */
        .content {
            text-align: center;
            padding: 4rem 0;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-text {
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 3rem;
        }

        /* خط جداکننده */
        .divider {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #74FFB3, transparent);
            margin: 2rem auto;
            border-radius: 10px;
        }

        /* ریسپانسیو */
        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
                letter-spacing: 0.3rem;
            }
            
            .navbar {
                flex-direction: column;
                gap: 0.8rem;
            }
            
            .nav-item {
                width: 100%;
                justify-content: center;
                padding: 0.8rem 1.5rem;
                font-size: 1rem;
            }
            
            .welcome-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- بکگراند انیمیشنی -->
    <div class="animated-bg"></div>
    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <!-- هدر با لوگو -->
        <header class="header">
            <div class="logo">NAGHOS.IR</div>
            <div class="logo-subtitle">✦ NAGHOS OFFICIAL ✦</div>
        </header>

        <!-- خط جداکننده -->
        <div class="divider"></div>

        <!-- منوی ناوبری با آیکون‌های کاستوم -->
        <nav class="navbar">
            <!-- خانه -->
            <a href="#" class="nav-item active">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </span>
                خانه
            </a>

            <!-- تبلیغات -->
            <a href="#" class="nav-item">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                        <line x1="8" y1="16" x2="12" y2="16"></line>
                    </svg>
                </span>
                تبلیغات
            </a>

            <!-- طراحی -->
            <a href="#" class="nav-item">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                        <path d="M2 12h20"></path>
                    </svg>
                </span>
                طراحی
            </a>

            <!-- آرشیو -->
            <a href="#" class="nav-item">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 8v13H3V8"></path>
                        <path d="M1 3h22v5H1z"></path>
                        <path d="M10 12h4"></path>
                    </svg>
                </span>
                آرشیو
            </a>
        </nav>

        <!-- خط جداکننده -->
        <div class="divider"></div>

        <!-- محتوای خوش‌آمدگویی -->
        <div class="content">
            <div class="welcome-text">
                ✨ به NAGHOS خوش آمدید ✨
            </div>
        </div>
    </div>
</body>
</html>
